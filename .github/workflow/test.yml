name: Simple CI

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main, testing]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: 📦 Install PHP Dependencies
        run: composer update --ignore-platform-reqs --no-interaction --prefer-dist

      - name: 📦 Install Node Dependencies & Build
        run: |
          npm install
          npm run build

      - name: 🔧 Setup Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: ✅ Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan test
